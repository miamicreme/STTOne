# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Southern Tier Operations Command Center as a static site.
# Render auto-detects this file: New + → Blueprint → connect this repo.
services:
  - type: web
    runtime: static
    name: southern-tier-command-center
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Branch to auto-deploy from; change if you deploy a different branch.
    branch: main
    envVars:
      - key: NODE_VERSION
        value: "20"
    # SPA fallback: serve index.html for any path (safe even with in-memory routing).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
