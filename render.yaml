# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Southern Tier Operations Command Center (Next.js static export)
# as a static site. Render auto-detects this file:
#   New + → Blueprint → connect this repo → Apply.
services:
  - type: web
    runtime: static
    name: southern-tier-command-center
    buildCommand: npm install && npm run build
    # Next.js `output: 'export'` writes the static site to ./out
    staticPublishPath: ./out
    branch: main
    envVars:
      - key: NODE_VERSION
        value: "20"
    # SPA fallback so any path resolves to the app shell.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Next emits content-hashed assets under /_next/static — safe to cache hard.
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
