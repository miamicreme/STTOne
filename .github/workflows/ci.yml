name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
